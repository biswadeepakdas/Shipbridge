# ShipBridge Railway Configuration
# Three services: api, celery worker, temporal worker

[service.api]
build_command = "cd apps/api && pip install -r requirements.txt"
start_command = "cd apps/api && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
health_check_path = "/health"
health_check_timeout = 30

[service.worker]
build_command = "cd apps/api && pip install -r requirements.txt"
start_command = "cd apps/api && celery -A app.workers worker --loglevel=info"

[service.temporal-worker]
build_command = "cd apps/api && pip install -r requirements.txt"
start_command = "cd apps/api && python -m app.workers.temporal_workflows"
